name: main_agent
version: 1.0.0
description: 有声绘本制作系统

case:
  id: encyclopedia
  title: 百科绘本
  description: 生成包含图片、文字和语音的百科类绘本
  order: 1
  cover: 科普百科海报.png

agent:
  name: picture_book_agent
  version: 1.0.0
  type: main_agent

runtime:
  prompt:
    source: skill_md
  middlewares:
    deepagent_skill:
      enabled: true
    checkpoint:
      enabled: true
    subagent:
      enabled: true

tools:
  finalize_workflow: {}
  annotate_image_with_numbers: {}
  delete_artifacts: {}
  generate_image:
    enable: true
    config_path: ./tools/t2i.yaml
  generate_audio:
    enable: true
    config_path: ./tools/tts.yaml
  batch_tool_call: {}
  generate_script_from_image:
    enable: true
    config_path: ./tools/vl_script.yaml

sub_agents:
  prompt_generator:
    enable: true
    name: prompt_generator
    description: 根据用户回答生成文生图提示词
    config_path: ./sub_agents/prompt_gen.yaml

ui:
  welcome:
    title: 欢迎使用儿童科普绘本生成助手
    subtitle: 我可以帮您为不同年龄段的儿童生成包含图片和语音的百科类科普绘本
    instructions:
      title: 请告诉我
      items:
        - 对象：想要了解的事物（如：老虎、挖掘机、向日葵）
        - 年龄：目标儿童的年龄段（如：2岁、5岁、8岁）
        - 风格：绘画风格（可选，如：卡通、手绘、写实）
    footer: 或者直接点击下方的快捷选项开始！
  quick_options:
    - label: 2岁宝宝看的老虎
      description: 适合低幼儿童的卡通风格
      prompt: 给2岁宝宝生成老虎的绘本
    - label: 5岁孩子的挖掘机
      description: 工程机械科普
      prompt: 给5岁孩子生成挖掘机的科普图
    - label: 3岁宝宝的恐龙
      description: 史前生物探索
      prompt: 3岁宝宝看的霸王龙
    - label: 7岁孩子的太阳系
      description: 天文知识启蒙
      prompt: 给7岁孩子生成太阳系的科普图
    - label: 4岁孩子的向日葵
      description: 植物生长过程
      prompt: 4岁孩子看的向日葵
    - label: 6岁孩子的消防车
      description: 特种车辆认知
      prompt: 给6岁孩子生成消防车的绘本
