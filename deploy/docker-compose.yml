services:
  # ── jiaojiao-gateway ──────────────────────────────────────────────────────────
  jiaojiao-gateway:
    build:
      context: ./jiaojiao-gateway
    container_name: jiaojiao-gateway
    ports:
      - "9021:9021"
    environment:
      - JIAOJIAO_SK=${JIAOJIAO_SK:-jjtk-20260306-default}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - Z_IMAGE_TURBO_URL=http://z-image-turbo:8998
      - T2I_BACKEND=${T2I_BACKEND:-z-image-turbo}
      - PORT=9021
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9021/health').read()"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  # ── z-image-turbo（需要 NVIDIA GPU + 模型文件，--profile gpu 启动）─────────────
  z-image-turbo:
    build:
      context: ./jiaojiao-gateway/z-image-turbo
    container_name: z-image-turbo
    volumes:
      - ${MODEL_PATH:-/mnt/models/z-image-turbo}:/model:ro
      - z-image-outputs:/tmp/z-image-outputs
    environment:
      - MODEL_PATH=/model
      - SERVER_PUBLIC_URL=${Z_IMAGE_PUBLIC_URL:-http://localhost:9021/z-image-turbo}
      - OUTPUT_DIR=/tmp/z-image-outputs
      - PORT=8998
      - WARMUP_ON_START=${WARMUP_ON_START:-1}
      - WARMUP_SIZE=${WARMUP_SIZE:-256*256}
      - WARMUP_STEPS=${WARMUP_STEPS:-9}
    healthcheck:
      test: ["CMD", "python", "-c", "import json, urllib.request; data=json.loads(urllib.request.urlopen('http://localhost:8998/health').read().decode('utf-8')); assert data.get('status') == 'ok'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: "2gb"
    restart: unless-stopped
    profiles:
      - gpu
      - test

  # ── gateway-test（集成测试运行器，--profile test 启动）────────────────────────
  gateway-test:
    build:
      context: ./test
    container_name: gateway-test
    volumes:
      - ./jiaojiao-gateway/tests:/tests:ro
    environment:
      - GATEWAY_URL=http://jiaojiao-gateway:9021
      - JIAOJIAO_SK=${JIAOJIAO_SK:-jjtk-20260306-default}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - GATEWAY_POLL_TIMEOUT=${GATEWAY_POLL_TIMEOUT:-300}
      - GATEWAY_POLL_INTERVAL=${GATEWAY_POLL_INTERVAL:-5}
      - Z_IMAGE_READY_TIMEOUT=${Z_IMAGE_READY_TIMEOUT:-900}
      - Z_IMAGE_READY_INTERVAL=${Z_IMAGE_READY_INTERVAL:-5}
    depends_on:
      jiaojiao-gateway:
        condition: service_healthy
      z-image-turbo:
        condition: service_healthy
    profiles:
      - test

volumes:
  z-image-outputs:
