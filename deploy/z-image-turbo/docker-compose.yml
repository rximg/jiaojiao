services:
  z-image-turbo:
    build:
      context: .
      dockerfile: Dockerfile
    image: z-image-turbo:local
    container_name: z-image-turbo
    ports:
      - "8998:8998"
    volumes:
      # 将本地模型目录只读挂载到容器 /model
      - type: bind
        source: D:/models/Tongyi-MAI/Z-Image-Turbo
        target: /model
        read_only: true
    environment:
      MODEL_PATH: /model
      # 客户端（jiaojiao）通过此地址下载生成的图片，修改为宿主机实际 IP
      SERVER_PUBLIC_URL: "http://host.docker.internal:8998"
      OUTPUT_DIR: /tmp/z-image-outputs
      PORT: "8000"
      # NVIDIA Container Toolkit 所需
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    # GPU 资源（需要安装 NVIDIA Container Toolkit）
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # 增大共享内存，避免大模型 OOM
    shm_size: "2gb"
    restart: unless-stopped
